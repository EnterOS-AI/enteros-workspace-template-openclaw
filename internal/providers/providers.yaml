# =============================================================================
# RUNTIME NATIVE SUPPORT MATRIX  (RFC #340 — CTO correction 2026-05-26)
# =============================================================================
# The `providers:` list above is the full catalog (the union of proxy /
# canvas / adapter / DB). It is NOT the support matrix. We do NOT support
# every model on every provider.
#
# This `runtimes:` block is the SSOT for "which providers + models does
# runtime R NATIVELY support". It constrains the catalog to each runtime's
# native support matrix — the INVERSE of a superset. Canvas (PR-4) offers
# ONLY a runtime's native models; the proxy (PR-3) routes ONLY native models
# with NO protocol translation (matches the cp#334 "use the native endpoint,
# don't translate" fix). A catalog provider that appears in NO runtime's
# native set is over-offer drift: it stays in `providers:` only if another
# runtime legitimately uses it, otherwise it is the drift this RFC prunes.
#
# AUTHORITATIVE MATRIX (provider level), encoded EXACTLY below:
#   claude-code -> anthropic (oauth + api), kimi (kimi-coding), minimax
#   hermes      -> kimi (kimi-coding)
#   codex       -> openai (subscription + api — the split openai-subscription /
#                  openai-api pair, mirroring anthropic oauth+api)
#   openclaw    -> kimi (kimi-coding)
#
# Each runtime entry lists native provider NAMES (referencing `providers:`
# above; Load fails closed on an unknown ref) plus the EXACT model ids that
# runtime exposes for that provider. Model ids are transcribed verbatim from
# each runtime template's config.yaml `runtime_config.models` block
# (git.moleculesai.app/molecule-ai/molecule-ai-workspace-template-<rt>),
# pruned to the native matrix above.
#
# DRIFT PRUNED (templates declare these, they are NOT in the native matrix,
# so they are deliberately absent from the runtimes block below — flagged in
# the RFC, carried in `providers:` only where another runtime needs them):
#   * claude-code template also declares: xiaomi-mimo (mimo-*), zai (GLM-*),
#     deepseek (deepseek-*). Outside {anthropic, kimi, minimax} -> pruned.
#   * codex template also declares: minimax-token-plan (codex-minimax-*).
#     Outside {openai} -> pruned. (Template itself notes the MiniMax
#     token-plan leg 404s on /v1/responses — a vendor gap, reinforcing the
#     prune.)
#   * openclaw template also declares: minimax (the default!), openai (gpt-*),
#     groq, openrouter. Outside {kimi} -> pruned. NOTE: openclaw's *default*
#     model is minimax:MiniMax-M2.7, NOT kimi — the CTO matrix narrows
#     openclaw to its native Kimi path (moonshot: prefix + KIMI_API_KEY ->
#     api.kimi.com/coding gateway). See RFC #340 update for the rationale.
#   * hermes template declares ~30 providers (nous, openrouter, anthropic,
#     gemini, deepseek, zai, minimax, alibaba, xiaomi, arcee, nvidia, ...).
#     The CTO matrix narrows hermes to {kimi} only -> all others pruned from
#     the native set.
runtimes:
  # claude-code: native Anthropic-API / Claude-Code endpoints. Anthropic is
  # split across two manifest providers (oauth + api) because the runtime
  # exposes both auth paths natively; both count as "anthropic".
  #
  # internal#718 P4 PR-1 (2026-05-27): the colon-namespaced BYOK form
  # `vendor:model` is the legacy spelling for explicit BYOK selection that
  # predates the slash-namespaced platform form `vendor/model`. Both forms
  # are LIVE across the workspace-create corpus (~44 test files +
  # canvas/ConfigTab default + the openclaw template's native list).
  # PRECEDENT: the openclaw runtime below already lists colon-form ids
  # (`moonshot:kimi-k2.6`) as the BYOK kimi-coding native set — the
  # adapter understands the colon form. P4 PR-1 extends the same precedent
  # to claude-code so `DeriveProvider` / `Manifest.ModelsForRuntime`
  # returns true for every legitimate BYOK model in the corpus. The
  # canonical slash form (`anthropic/claude-opus-4-7`) is the
  # platform-managed routing form (proxy upstream lookup); the colon
  # form is the legacy BYOK selection form. Both are first-class
  # registry entries on the runtime's native provider set.
  claude-code:
    providers:
      - name: anthropic-oauth
        # Colon-form aliases (`anthropic:sonnet`, ...) are the legacy BYOK
        # spelling for the OAuth alias path that the live corpus carries.
        # Per the same P4 PR-1 precedent (see colon-form comment above),
        # these are first-class registry entries — DeriveProvider resolves
        # them to anthropic-oauth deterministically.
        models:
          - sonnet
          - opus
          - haiku
          - anthropic:sonnet
          - anthropic:opus
          - anthropic:haiku
      - name: anthropic-api
        # BYOK versioned API ids — bare form is the canonical id the
        # Anthropic SDK accepts on the wire; colon form is the legacy
        # BYOK selection spelling used across the create/test corpus
        # (internal#718 P4 PR-1). Both forms route to anthropic-api.
        models:
          - claude-sonnet-4-6
          - claude-opus-4-7
          - claude-opus-4-8
          - claude-haiku-4-5
          - claude-sonnet-4-5
          - anthropic:claude-sonnet-4-6
          - anthropic:claude-opus-4-7
          - anthropic:claude-opus-4-8
          - anthropic:claude-haiku-4-5
          - anthropic:claude-sonnet-4-5
      - name: kimi-coding
        # BYOK kimi-coding gateway ids — bare form is the canonical id
        # the gateway routes. The colon form `moonshot:kimi-k2.*` was
        # removed because claude-code's adapter cannot strip the
        # `moonshot:` prefix — it only handles `anthropic:`/`claude:`
        # (cp#521). The bare forms already cover these models.
        models:
          - kimi-for-coding
          - kimi-k2.5
          - kimi-k2
      - name: minimax
        # BYOK MiniMax ids — bare form is the canonical id. The colon
        # forms `minimax:MiniMax-*` were removed because claude-code's
        # adapter cannot strip the `minimax:` prefix — it only handles
        # `anthropic:`/`claude:` (cp#521). The bare forms already cover
        # these models.
        models:
          - MiniMax-M2
          - MiniMax-M2.7
          - MiniMax-M2.7-highspeed
          - MiniMax-M3
      # Platform-managed (no tenant key; Molecule owns billing). The
      # vendor/model-namespaced ids the proxy resolves to the upstream vendor.
      # Canonical for the template's `provider: platform` model entries — the
      # drift gate (molecule-ci validate-workspace-template) enforces the
      # template can offer no platform model absent from this set.
      - name: platform
        models:
          - anthropic/claude-opus-4-7
          - anthropic/claude-opus-4-8
          - anthropic/claude-sonnet-4-6
          - moonshot/kimi-k2.6
          - moonshot/kimi-k2.5
          - minimax/MiniMax-M2.7
          - minimax/MiniMax-M2.7-highspeed
          - minimax/MiniMax-M3
      # NAME-ONLY BYOK arms (cp#529): zero model ids → add NOTHING to the
      # platform menu (ModelsForRuntime), but wire these CONFIRMED-NON-PLATFORM
      # providers into claude-code's NATIVE prefix-routing set so the bare BYOK
      # ids the claude-code template offers (GLM-*, deepseek-*, mimo-*) resolve
      # via DeriveProvider. BILLING-SAFE: zai/deepseek/xiaomi-mimo are tenant-key
      # (BYOK) providers — never platform-shared — so routing through them bills
      # the tenant's own key, never the platform's.
      - name: zai
      - name: deepseek
      - name: xiaomi-mimo

  # hermes: native Kimi PLUS the shared platform MiniMax family. hermes-agent
  # owns its own broad provider matrix; the Molecule platform arm carries Kimi
  # (hermes's historical native platform family) AND minimax/MiniMax-M2.7(+
  # siblings) so the ONE shared platform default model (MOLECULE_LLM_DEFAULT_MODEL
  # = minimax/MiniMax-M2.7) routes platform-managed on a hermes concierge exactly
  # as it does on claude-code/codex/openclaw — closing the cross-runtime gap that
  # otherwise mis-classified the shared default as BYOK (byok-minimax) on hermes.
  hermes:
    providers:
      - name: kimi-coding
        models: [kimi-coding/kimi-k2]
      # Platform-managed (no tenant key; Molecule owns billing). Kimi is hermes's
      # native platform family; the minimax/* ids are the SHARED platform default
      # family (parity with claude-code/codex/openclaw). Routed via the proxy
      # OpenAI-compat surface; see the template's scripts/derive-platform-llm.sh.
      - name: platform
        models:
          - moonshot/kimi-k2.6
          - moonshot/kimi-k2.5
          - minimax/MiniMax-M2.7
          - minimax/MiniMax-M2.7-highspeed
          - minimax/MiniMax-M3
      # NAME-ONLY BYOK arms (cp#529): zero model ids → no addition to the
      # platform menu, but wire hermes's CONFIRMED-NON-PLATFORM passthrough +
      # bare-vendor providers into its NATIVE prefix-routing set so the BYOK
      # ids the hermes template offers (openrouter/…, huggingface/…, deepseek/…,
      # zai:…, etc.) resolve via DeriveProvider. ALL tenant-key (BYOK).
      - name: openrouter
      - name: huggingface
      - name: ai-gateway
      - name: opencode-zen
      - name: opencode-go
      - name: kilocode
      - name: custom
      - name: nvidia
      - name: arcee
      - name: ollama-cloud
      - name: minimax-cn
      - name: nousresearch
      - name: deepseek
      - name: zai
      - name: xiaomi-mimo
      - name: alibaba
      # DEDICATED BYOK-VENDOR arms (cp#529): the namespaced ids hermes offers for
      # the SHARED upstream vendors (anthropic/claude-*, gemini/*, openai/*,
      # minimax/*) NOW resolve to these tenant-key BYOK-vendor providers — NOT
      # the platform-shared `platform` provider (which would bill the platform's
      # key). NAME-ONLY (no models) → no platform-menu change, prefix-routing
      # only, BYOK-billed. This converts the last 12 hermes residual ids from
      # cp#529 drift to routable.
      - name: byok-anthropic
      - name: byok-gemini
      - name: byok-openai
      - name: byok-minimax

  # codex: OpenAI — BYOK split across TWO native providers
  # (openai-subscription + openai-api), mirroring claude-code's anthropic
  # oauth+api split, PLUS platform-managed (the `platform` ref below, served via
  # the proxy Responses surface).
  #
  # The split fixes the prod "picks provider='openai' but it is not in the
  # providers registry. Known providers: openai-subscription, openai-api" wedge:
  # the codex template/adapter registry uses the SPLIT names, never bare
  # `openai`, so the SSOT must derive one of them. openai-subscription is the
  # DEFAULT (the adapter's resolve-provider precedence #1 picks the ChatGPT/Codex
  # subscription when CODEX_AUTH_JSON is present), so it is listed FIRST and owns
  # the bare gpt-* family — DeriveProvider(codex, gpt-5.5) -> openai-subscription.
  # openai-api is referenced too (the direct-OPENAI_API_KEY BYOK arm); the same
  # gpt-* ids are exact-listed under both arms and DeriveProvider disambiguates
  # by available auth env (OPENAI_API_KEY -> openai-api; the subscription
  # auth.json env or no auth context -> the first-declared default,
  # openai-subscription) — the identical oauth-vs-key disambiguation
  # claude-code's anthropic pair uses.
  codex:
    providers:
      # DEFAULT arm (listed first): ChatGPT/Codex subscription via OAuth.
      - name: openai-subscription
        models:
          - gpt-5.5
          - gpt-5.4
          - gpt-5.4-mini
          - gpt-5.3-codex
          - gpt-5.3-codex-spark
          - gpt-5.2
      # Direct OpenAI API-key BYOK arm. Same gpt-* family; selected over the
      # subscription default when OPENAI_API_KEY is the available auth env (or
      # via the explicit provisioner LLM_PROVIDER=openai-api).
      - name: openai-api
        models:
          - gpt-5.5
          - gpt-5.4
          - gpt-5.4-mini
          - gpt-5.3-codex
          - gpt-5.3-codex-spark
          - gpt-5.2
      # Platform-managed OpenAI. NOW servable: the proxy exposes the OpenAI
      # Responses surface (/internal/llm/openai/v1/responses) that the Codex
      # CLI (0.130+, Responses-API-only) requires. The codex template adapter
      # routes these via that surface (provider_config.py platform provider,
      # auth_mode=openai_compat_responses, wire_api=responses). The deploy's
      # MOLECULE_LLM_DEFAULT_MODEL SSOT (Infisical /shared/controlplane/llm) is
      # minimax/MiniMax-M2.7 — the openai/gpt-* ids here are the codex-native
      # platform menu, not the shared default (see task #83 note below).
      #
      # task #83 (CTO 2026-06-24): MiniMax is the PLATFORM-MANAGED default for
      # ALL runtimes (cheaper, token-plan prepaid; BYOK optional), so the
      # concierge default `minimax/MiniMax-M2.7` must derive to the closed
      # `platform` provider (IsPlatform=true → platform_managed billing,
      # required_env=[]) for codex too — NOT byok-minimax (which needs a tenant
      # key). These EXACT `minimax/...` ids are listed here so DeriveProvider's
      # exact-id step (authoritative, beats prefix) picks `platform` even though
      # byok-minimax's `(?i)^(minimax[:/]|codex-minimax-)` prefix also matches
      # them — exactly how claude-code's platform arm carries them. They route
      # via the proxy's MiniMax upstream (ResolveUpstream maps `minimax/` →
      # the `minimax` catalog entry's api.minimax.io). The BYOK
      # `codex-minimax-m2.7` token-plan id stays on byok-minimax below (its
      # `codex-minimax-` leg), so the platform default and the BYOK opt-in
      # coexist without overlap.
      - name: platform
        models:
          - openai/gpt-5.4
          - openai/gpt-5.4-mini
          - minimax/MiniMax-M2.7
          - minimax/MiniMax-M2.7-highspeed
          - minimax/MiniMax-M3
      # NAME-ONLY BYOK arm (cp#529): the codex template offers a BYOK MiniMax
      # token-plan model `codex-minimax-m2.7` (its `minimax-token-plan` provider:
      # base_url api.minimax.io, tenant MINIMAX_API_KEY, model_id_override
      # codex-MiniMax-M2.7). It resolves to byok-minimax via the narrowly-anchored
      # `codex-minimax-` leg of byok-minimax's matcher (same upstream, tenant key)
      # — NOT a broad matcher. NAME-ONLY → no platform-menu change, BYOK-billed.
      # Converts the last codex residual id from cp#529 drift to routable.
      - name: byok-minimax

  # openclaw: native Kimi only. openclaw's moonshot: model prefix + a
  # KIMI_API_KEY (sk-kimi-*) routes to api.kimi.com/coding (kimi-for-coding),
  # which is the native Kimi path. Default minimax / openai / groq / openrouter
  # legs are pruned per the CTO matrix.
  openclaw:
    providers:
      - name: kimi-coding
        models:
          - moonshot:kimi-k2.6
          - moonshot:kimi-k2.5
      # Platform-managed Kimi. Note the slash form (moonshot/...) here vs the
      # BYOK colon form (moonshot:...) above — openclaw's adapter uses colon
      # ids natively; the platform path normalizes to the proxy's slash form.
      #
      # task #83 (CTO 2026-06-24): MiniMax is the PLATFORM-MANAGED default for
      # ALL runtimes (cheaper, token-plan prepaid; BYOK optional). openclaw's
      # default model is MiniMax, so its concierge default `minimax/MiniMax-M2.7`
      # must derive to the closed `platform` provider (IsPlatform=true →
      # platform_managed billing, required_env=[]) — NOT byok-minimax (which
      # needs a tenant key). These EXACT `minimax/...` ids (slash form, the
      # proxy's platform spelling) are listed here so DeriveProvider's exact-id
      # step (authoritative, beats prefix) picks `platform` even though
      # byok-minimax's `(?i)^(minimax[:/]|codex-minimax-)` prefix also matches
      # them. They route via the proxy's MiniMax upstream (ResolveUpstream maps
      # `minimax/` → the `minimax` catalog entry's api.minimax.io). The BYOK
      # colon form `minimax:MiniMax-M2.7` stays on byok-minimax below, so the
      # platform default and the BYOK opt-in coexist without overlap.
      - name: platform
        models:
          - moonshot/kimi-k2.6
          - moonshot/kimi-k2.5
          - minimax/MiniMax-M2.7
          - minimax/MiniMax-M2.7-highspeed
          - minimax/MiniMax-M3
      # NAME-ONLY BYOK arms (cp#529): zero model ids → no platform-menu change,
      # but wire openclaw's CONFIRMED-NON-PLATFORM passthroughs into its NATIVE
      # prefix-routing set so the BYOK colon/slash ids the openclaw template
      # offers (openrouter:…, custom:…) resolve via DeriveProvider. BYOK only.
      - name: openrouter
      - name: custom
      # DEDICATED BYOK-VENDOR arms (cp#529): openclaw's default model is
      # `minimax:MiniMax-M2.7`, plus it offers `openai:*` and `groq:*` BYOK ids.
      # These NOW resolve to the tenant-key BYOK-vendor providers (NOT the
      # platform key). NAME-ONLY → prefix-routing only, BYOK-billed. This converts
      # the last 7 openclaw residual ids from cp#529 drift to routable AND makes
      # the runtime's DEFAULT model (minimax:MiniMax-M2.7) resolve.
      - name: byok-openai
      - name: byok-minimax
      - name: groq
