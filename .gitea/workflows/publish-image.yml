name: publish-image

# Builds the openclaw workspace template Dockerfile and pushes it to ECR as
# `<REGISTRY>/workspace-template-openclaw:latest` + `:sha-<7>`.
#
# Ported/inlined from molecule-ci's publish-template-image.yml reusable
# workflow. Cross-repo `uses:` is BLOCKED on Gitea 1.22.6 because
# DEFAULT_ACTIONS_URL=github causes the runner to attempt the lookup against
# github.com, which always 404s even for same-instance repos.
# (feedback_gitea_cross_repo_uses_blocked)
#
# Registry: production uses ECR (MOLECULE_IMAGE_REGISTRY env var on EC2 /
# Railway) backed by org-level AWS creds. The ECR repo
# `molecule-ai/workspace-template-openclaw` must exist (created by migration
# sweep or on first push via "Ensure ECR repository exists" step).
#
# Gitea 1.22.6 hostile-shape checklist applied:
#   - No workflow_dispatch.inputs
#   - No merge_group trigger
#   - No cross-repo uses:
#   - GITHUB_SERVER_URL pinned at workflow level
#   - No on.push.paths: filter
#   - timeout-minutes on every job
#
# Cascade signal: molecule-core/publish-runtime.yml fans out by git-pushing
# an updated `.runtime-version` file to this repo's main branch, which trips
# the `on: push: branches: [main]` trigger here.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GITHUB_SERVER_URL: https://git.moleculesai.app
  ECR_REGISTRY: 153263036946.dkr.ecr.us-east-2.amazonaws.com
  IMAGE_NAME: 153263036946.dkr.ecr.us-east-2.amazonaws.com/molecule-ai/workspace-template-openclaw
  AWS_DEFAULT_REGION: us-east-2

permissions:
  contents: read

jobs:
  resolve-version:
    name: Resolve runtime version
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      version: ${{ steps.read.outputs.version }}
      sha: ${{ steps.read.outputs.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: read
        shell: bash
        run: |
          if [ -f .runtime-version ]; then
            v="$(head -n1 .runtime-version | tr -d '[:space:]')"
            echo "version=${v}" >> "$GITHUB_OUTPUT"
            echo "resolved runtime version from .runtime-version: ${v}"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "no .runtime-version file — will use Dockerfile/requirements.txt pin"
          fi
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  # pc2-safe: false — needs docker (ECR login + buildx + push); routes to the
  # dedicated Linux publish runners only.
  #
  # task #390 B-lite + internal#597: pin to `[publish, release]` (NOT
  # `ubuntu-latest`). The `ubuntu-latest` label is advertised by BOTH the
  # Linux operator-host runners AND the Windows/WSL hongming-pc-runner-*
  # runners (PC2). A docker build/push job landing on PC2 fails with
  # "Failed to initialize: protocol not available" (npipe→Linux-container
  # bridging gap). Only molecule-runner-publish-{1,2} advertise BOTH
  # `publish` and `release`, so the array form excludes the WSL pair
  # while keeping the dedicated Linux publish runners — matching the
  # sibling claude-code / codex / hermes templates which already use
  # [publish, release].
  publish:
    name: Build & push workspace-template-openclaw image
    runs-on: [publish, release]
    timeout-minutes: 30
    needs: resolve-version
    # Surface the Push step's digest at job level so the promote-pin job can
    # consume `needs.publish.outputs.digest` across the `needs:` edge.
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint — no bare imports of runtime modules
        shell: bash
        run: |
          set -eu
          FALLBACK_MODULES='plugins|adapter_base|config|main|preflight|prompt|coordinator|consolidation|events|heartbeat|transcript_auth|runtime_wedge|watcher|skill_loader|policies|adapters|builtin_tools|executor_helpers|a2a_executor|a2a_client|a2a_tools|a2a_cli|a2a_mcp_server|agent|agents_md|initial_prompt|molecule_ai_status|platform_auth|shared_runtime'
          RUNTIME_MODULES=""
          mkdir -p /tmp/runtime-wheel
          if pip download --quiet molecule-ai-workspace-runtime --no-deps -d /tmp/runtime-wheel 2>/dev/null; then
            WHEEL=$(ls /tmp/runtime-wheel/*.whl 2>/dev/null | head -1)
            if [ -n "$WHEEL" ]; then
              RUNTIME_MODULES=$(unzip -p "$WHEEL" molecule_runtime/_runtime_modules.json 2>/dev/null \
                | python3 -c "import sys,json; m=json.load(sys.stdin); print('|'.join(sorted(set(m['top_level_modules']) | set(m['subpackages']))))" 2>/dev/null || echo "")
            fi
          fi
          if [ -n "$RUNTIME_MODULES" ]; then
            echo "::notice::lint module list from published wheel"
          else
            RUNTIME_MODULES="$FALLBACK_MODULES"
            echo "::warning::could not read _runtime_modules.json from wheel — using inline fallback"
          fi
          if HITS=$(grep -nE "^\s*from (${RUNTIME_MODULES}) import" *.py 2>/dev/null); then
            echo "::error::Bare imports of runtime modules found — use 'from molecule_runtime.<module> import'"
            echo "$HITS" | sed 's/^/  /'
            exit 1
          fi
          echo "::notice::no bare imports of runtime modules in *.py files"

      - name: Log in to ECR
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          aws ecr get-login-password --region us-east-2 | \
            docker login --username AWS --password-stdin "${ECR_REGISTRY}"

      - name: Verify Docker daemon access
        run: |
          set -euo pipefail
          docker info >/dev/null 2>&1 || {
            echo "::error::Docker daemon is not accessible — check runner sock mount"
            exit 1
          }
          echo "Docker daemon OK"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Ensure ECR repository exists
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          repo_path="${IMAGE_NAME#*/}"
          repo_path="${repo_path#*/}"
          if ! aws ecr describe-repositories --repository-names "${repo_path}" --region us-east-2 >/dev/null 2>&1; then
            aws ecr create-repository \
              --repository-name "${repo_path}" \
              --image-scanning-configuration scanOnPush=true \
              --region us-east-2 >/dev/null
            echo "::notice::created ECR repository ${repo_path}"
          else
            echo "ECR repository ${repo_path} already exists"
          fi

      - name: Build image (load for smoke test, do not push yet)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:sha-${{ needs.resolve-version.outputs.sha }}
          build-args: |
            RUNTIME_VERSION=${{ needs.resolve-version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://git.moleculesai.app/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Molecule AI workspace template — openclaw runtime

      - name: Smoke test — import every /app/*.py
        shell: bash
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:sha-${{ needs.resolve-version.outputs.sha }}
        run: |
          set -eu
          docker run --rm --entrypoint sh "${IMAGE}" -c '
            set -e
            cd /app
            for f in *.py; do
              [ "$f" = "__init__.py" ] && continue
              mod="${f%.py}"
              python3 -c "import $mod" || { echo "::error::failed to import $mod"; exit 1; }
              echo "  import $mod OK"
            done
          '
          echo "::notice::${IMAGE}: all /app/*.py modules import cleanly"

      - name: Push image to ECR (post-smoke)
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ needs.resolve-version.outputs.sha }}
          build-args: |
            RUNTIME_VERSION=${{ needs.resolve-version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://git.moleculesai.app/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.description=Molecule AI workspace template — openclaw runtime


  promote-pin:
    # RFC internal#529 Layer A — auto-promote the just-pushed digest to
    # runtime_image_pins via the control-plane admin endpoint, so existing
    # tenants actually pick up the new image instead of staying pinned to the
    # old digest. Without this job the publish job builds + pushes :latest/:sha
    # to ECR but the prod (and staging) runtime_image_pins never move — the
    # silent-stale-pin gap this PR closes. Mirrors the claude-code / codex /
    # hermes sibling templates which already promote.
    #
    # Gitea has no reliable `workflow_run`, so promotion is a job in THIS same
    # workflow (not a separate workflow listening on publish success). Gated on
    # `if: success() && github.ref == 'refs/heads/main'` so a failed publish
    # (smoke red / push red) or a non-main run never bumps any pin — promotion
    # only ever runs AFTER a green build/push on main.
    #
    # Dual-environment fan-out: staging CP runtime_image_pins is a SEPARATE
    # SSOT from prod, so the `E2E Staging SaaS` canary boots whatever staging's
    # pin points at. We promote to BOTH prod (api.moleculesai.app) and staging
    # (staging-api.moleculesai.app).
    #
    # Per-target ISOLATION: `strategy.fail-fast: false` makes each matrix leg
    # independent — a prod-promote failure does NOT cancel the staging-promote
    # and vice-versa. Each leg is fail-LOUD on a non-2xx for ITS OWN target so a
    # stranded pin is never hidden behind a green workflow.
    name: Promote runtime_image_pins (CP admin)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [resolve-version, publish]
    if: ${{ success() && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - env_name: prod
            cp_host: api.moleculesai.app
          - env_name: staging
            cp_host: staging-api.moleculesai.app
    steps:
      - name: POST /cp/admin/runtime-image/promote (${{ matrix.env_name }})
        env:
          # Each matrix leg reads its own environment's CP admin token. Both
          # secrets must be configured on this repo's CI (or org-wide) for the
          # respective promote to run: CP_ADMIN_API_TOKEN (prod) and
          # CP_ADMIN_API_TOKEN_STAGING (staging — a STAGING control-plane admin
          # token). Same secret names the claude-code/hermes templates use.
          PROD_TOKEN: ${{ secrets.CP_ADMIN_API_TOKEN }}
          STAGING_TOKEN: ${{ secrets.CP_ADMIN_API_TOKEN_STAGING }}
          ENV_NAME: ${{ matrix.env_name }}
          CP_HOST: ${{ matrix.cp_host }}
          TEMPLATE_NAME: openclaw
          IMAGE_DIGEST: ${{ needs.publish.outputs.digest }}
          GIT_SHA: ${{ needs.resolve-version.outputs.sha }}
        run: |
          set -euo pipefail
          if [ "${ENV_NAME}" = "prod" ]; then
            CP_ADMIN_API_TOKEN="${PROD_TOKEN}"
            TOKEN_SECRET_NAME="CP_ADMIN_API_TOKEN"
          else
            CP_ADMIN_API_TOKEN="${STAGING_TOKEN}"
            TOKEN_SECRET_NAME="CP_ADMIN_API_TOKEN_STAGING"
          fi
          if [ -z "${CP_ADMIN_API_TOKEN}" ]; then
            echo "::error::${TOKEN_SECRET_NAME} secret not configured on this repo — cannot promote ${ENV_NAME} pin"
            exit 1
          fi
          if [ -z "${IMAGE_DIGEST}" ]; then
            echo "::error::publish digest is empty — Push step did not expose digest"
            exit 1
          fi
          body=$(printf '{"template_name":"%s","image_digest":"%s","git_sha":"%s","notes":"auto-promote via publish-image.yml @ %s -> %s"}' \
            "${TEMPLATE_NAME}" "${IMAGE_DIGEST}" "${GIT_SHA}" "${GITHUB_SHA}" "${ENV_NAME}")
          echo "::notice::POST runtime-image/promote env=${ENV_NAME} host=${CP_HOST} template=${TEMPLATE_NAME} digest=${IMAGE_DIGEST} git_sha=${GIT_SHA}"
          resp=$(mktemp)
          code=$(curl -sS -o "${resp}" -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${CP_ADMIN_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${body}" \
            "https://${CP_HOST}/cp/admin/runtime-image/promote")
          echo "HTTP ${code}"
          cat "${resp}"
          echo
          if [ "${code}" != "200" ] && [ "${code}" != "201" ]; then
            echo "::error::${ENV_NAME} promote failed (HTTP ${code})"
            exit 1
          fi
          echo "::notice::${ENV_NAME} runtime_image_pins.${TEMPLATE_NAME} bumped to ${IMAGE_DIGEST}"
