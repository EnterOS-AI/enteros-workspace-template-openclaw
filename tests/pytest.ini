[pytest]
# Run from this directory (`cd tests && pytest`, or
# `pytest -c tests/pytest.ini tests/`). The repo root ships a
# package-context-only __init__.py (`from .adapter import ...`, the
# standard template convention shared by claude-code/langgraph/etc.)
# that must not be collected as a test module; keeping the rootdir at
# tests/ avoids pytest walking it. conftest.py here loads adapter.py
# straight from the repo root by file path, exactly how
# molecule-runtime / the canonical validator load it.
rootdir = .
python_files = test_*.py
