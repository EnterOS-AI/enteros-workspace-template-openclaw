[pytest]
# Pytest discovers this file under tests/ and uses its directory as the
# configuration root. Run `pytest tests/` (the CI shape), `cd tests && pytest`,
# or `pytest -c tests/pytest.ini tests/`. The repo root ships a
# package-context-only __init__.py (`from .adapter import ...`, the
# standard template convention shared by claude-code/langgraph/etc.)
# that must not be collected as a test module. conftest.py here loads adapter.py
# straight from the repo root by file path, exactly how
# molecule-runtime / the canonical validator load it.
python_files = test_*.py
